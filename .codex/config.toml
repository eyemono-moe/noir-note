# Project-scoped Codex configuration for eyemono.md.
#
# Keep personal choices such as model, approval policy, and sandbox strictness in
# ~/.codex/config.toml. This checked-in file should contain only project-neutral
# defaults that make Codex behave consistently for contributors who trust this
# repository.

# The root AGENTS.md is intentionally detailed because it replaces the existing
# Claude-specific project context for Codex users. Raise the default 32 KiB cap so
# nested AGENTS.md files can be added later without silently truncating guidance.
project_doc_max_bytes = 65536
