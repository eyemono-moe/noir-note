<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md</title>
    <script>
      (function () {
        // ページロード時に localStorage からテーマ設定を読み込んで適用
        try {
          const config = JSON.parse(localStorage.getItem("app-config"));
          let theme = config ? config.theme : "system";

          if (theme === "system") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }

          // <html> タグに data-theme をセット（CSSのセレクタに合わせる）
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // localStorageが空、またはJSONパース失敗時のフォールバック
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
