    />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f6f8fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#010409" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://md.eyemono.moe/" />
    <meta property="og:title" content="eyemono.md - Browser-Based Markdown Note-Taking App" />

      property="og:description"
      content="A markdown note-taking app that runs entirely in your browser. All notes are stored locally using the Origin Private File System (OPFS)."

    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:title" content="eyemono.md - Browser-Based Markdown Note-Taking App" />

      property="twitter:description"
      content="A markdown note-taking app that runs entirely in your browser. All notes are stored locally using the Origin Private File System (OPFS)."
    />

    <link rel="canonical" href="https://md.eyemono.moe/" />
    <script type="application/ld+json">
      {
        "@context": "http://schema.org",
        "@type": "SoftwareApplication",
        "applicationCategory": "ProductivityApplication",
        "description": "A privacy-focused, browser-based Markdown note-taking app.",
        "name": "eyemono.md",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "operatingSystem": "Web",
        "url": {
          "@id": "https://md.eyemono.moe/"
        }
      }
    </script>
    <script>
      (function () {
        // ページロード時に localStorage からテーマ設定を読み込んで適用
        try {
          const config = JSON.parse(localStorage.getItem("app-config"));
          let theme = config ? config.theme : "system";

          if (theme === "system") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }

          // <html> タグに data-theme をセット（CSSのセレクタに合わせる）
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          dい; // localStorageが空、許可されていない、またはJSONパース失敗時のフォールバック
          document.documentElement.setAttribute(
            "data-theme",
            window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light",
          );
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <style>
        #noscript-gate {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1rem;
          padding: 2rem;
          overflow-y: auto;
          background: var(--color-surface-primary, #fff);
          color: var(--color-text-primary, #1f2328);
          font-family:
            -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          font-size: 14px;
          line-height: 1.5;
          box-sizing: border-box;
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate {
            background: var(--color-dark-surface-primary, #0d1117);
            color: var(--color-dark-text-primary, #f0f6fc);
          }
        }

        #noscript-gate .icon {
          font-size: 3rem;
          line-height: 1;
        }

        #noscript-gate h1 {
          font-size: 1.25rem;
          font-weight: 600;
          margin: 0;
        }

        #noscript-gate p {
          font-size: 0.875rem;
          color: var(--color-text-secondary, #59636e);
          text-align: center;
          max-width: 28rem;
          margin: 0;
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate p {
            color: var(--color-dark-text-secondary, #9198a1);
          }
        }

        #noscript-gate hr {
          width: 100%;
          max-width: 32rem;
          border: none;
          border-top: 1px solid var(--color-border-primary, #d1d9e0);
          margin: 0.25rem 0;
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate hr {
            border-color: var(--color-dark-border-primary, #3d444d);
          }
        }

        #noscript-gate label {
          font-size: 0.75rem;
          color: var(--color-text-secondary, #59636e);
          width: 100%;
          max-width: 32rem;
          text-align: center;
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate label {
            color: var(--color-dark-text-secondary, #9198a1);
          }
        }

        #noscript-gate textarea {
          width: 100%;
          max-width: 32rem;
          min-height: 14rem;
          padding: 0.75rem;
          border-radius: 0.5rem;
          border: 1px solid var(--color-border-primary, #d1d9e0);
          background: var(--color-surface-secondary, #f6f8fa);
          color: var(--color-text-primary, #1f2328);
          font-family:
            ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
          font-size: 0.875rem;
          line-height: 1.6;
          resize: vertical;
          outline: none;
          box-sizing: border-box;
          transition: border-color 0.15s;
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate textarea {
            border-color: var(--color-dark-border-primary, #3d444d);
            background: var(--color-dark-surface-secondary, #151b23);
            color: var(--color-dark-text-primary, #f0f6fc);
          }
        }

        #noscript-gate textarea:focus {
          border-color: var(--color-dark-border-accent, #1f6feb);
          box-shadow: 0 0 0 3px
            color-mix(in srgb, var(--color-dark-border-accent, #1f6feb) 20%, transparent);
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate textarea:focus {
            border-color: var(--color-dark-border-accent, #1f6feb);
            box-shadow: 0 0 0 3px
              color-mix(in srgb, var(--color-dark-border-accent, #1f6feb) 20%, transparent);
          }
        }

        #noscript-gate textarea::placeholder {
          color: var(--color-text-disabled, #818b98);
        }

        @media (prefers-color-scheme: dark) {
          #noscript-gate textarea::placeholder {
            color: var(--color-dark-text-disabled, #656c76);
          }
        }
      </style>
      <div id="noscript-gate">
        <p class="icon">⚠️</p>
        <h1>JavaScript is required</h1>
        <p>
          eyemono.md requires JavaScript to run. Please enable JavaScript in your browser settings
          to use the full app.
        </p>
        <hr />
        <label for="noscript-scratch">Scratch pad — not saved</label>
        <textarea
          id="noscript-scratch"
          placeholder="You can jot notes here, but they won't be saved…"
          spellcheck="false"
        ></textarea>
      </div>
    </noscript>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
